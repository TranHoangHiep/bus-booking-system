spring:
  application:
    name: backend-bus-booking-system
  datasource:
    url: jdbc:mariadb://localhost:3306/bus_booking
    username: bususer
    password: buspassword
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: localhost
      port: 6379
